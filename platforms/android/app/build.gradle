plugins {
    id 'com.android.application'
}

def partyboardRepoDir = rootProject.projectDir.parentFile.parentFile
def partyboardGeneratedAssetsDir = layout.buildDirectory.dir('generated/assets/partyboard').get().asFile
def syncPartyBoardAssets = tasks.register('syncPartyBoardAssets', Sync) {
    from(new File(partyboardRepoDir, 'res')) {
        into 'res'
        exclude '**/.DS_Store'
    }
    into partyboardGeneratedAssetsDir
}

android {
    namespace 'com.mariopartyrd.partyboard'
    compileSdk 36

    defaultConfig {
        applicationId 'com.mariopartyrd.partyboard'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
            assets.srcDirs = [partyboardGeneratedAssetsDir]
        }
    }

    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'x86_64'
            universalApk false
        }
    }

    lint {
        abortOnError false
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

tasks.configureEach { task ->
    if ((task.name.startsWith('merge') && task.name.endsWith('Assets')) ||
        task.name.toLowerCase().contains('lint')) {
        task.dependsOn(syncPartyBoardAssets)
    }
}
